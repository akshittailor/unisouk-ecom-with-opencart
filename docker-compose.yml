version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENCART_BASE_URL: http://opencart
    depends_on:
      - redis
      - opencart
    ports:
      - "3000:3000"
    networks:
      - ecom-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ecom-network

  opencart-db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: opencart
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - opencart_mysql_data:/var/lib/mysql
    networks:
      - ecom-network

  opencart:
    build:
      context: ./opencart
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
    depends_on:
      - opencart-db
    ports:
      - "8080:80"
    networks:
      - ecom-network

  phpmyadmin:
    image: arm64v8/phpmyadmin
    restart: unless-stopped
    depends_on:
      - opencart-db
    environment:
      PMA_HOST: opencart-db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge

volumes:
  opencart_mysql_data: